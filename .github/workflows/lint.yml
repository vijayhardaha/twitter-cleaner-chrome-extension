name: CI – Lint & Format

on:
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "package.json"
      - ".github/workflows/lint.yml"
  pull_request:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint scripts
        run: bun run lint

      - name: Format check
        run: bun run format:check
